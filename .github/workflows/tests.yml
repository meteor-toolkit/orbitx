name: Tests

on:
  push:
    branches: ["main"]
  pull_request:

jobs:
  test:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12"]
        include:
          # Full matrix on manually-triggered runs and tags only
          - python-version: "3.11"
            if-tag-or-manual: true
          - python-version: "3.13"
            if-tag-or-manual: true

    steps:
      - uses: actions/checkout@v4

      - name: Set up Miniconda
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: ${{ matrix.python-version }}
          activate-environment: test-env
          channels: conda-forge,defaults
          channel-priority: strict
          auto-activate-base: false

      - name: Install conda dependencies
        shell: bash -el {0}
        run: |
          conda install -y -c conda-forge orekit cartopy
          python -c "import orekit" || (echo "orekit import failed after install" && exit 1)

      - name: Install package
        shell: bash -el {0}
        run: pip install -e ".[dev]"

      - name: Run tests
        shell: bash -el {0}
        run: |
          mkdir -p test_report
          pytest \
            --html=test_report/report.html \
            --cov-report html:test_report/cov_report \
            --cov-report xml:test_report/coverage.xml \
            --junitxml=test_report/junit.xml \
            --cov=orbitx

      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-py${{ matrix.python-version }}
          path: test_report/
          retention-days: 7

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.12'
        uses: codecov/codecov-action@v4
        with:
          files: test_report/coverage.xml
          fail_ci_if_error: false

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: pip
      - run: pip install -e ".[dev]"
      - name: ruff format
        run: ruff format --check orbitx
      - name: ruff lint
        run: ruff check orbitx
      - name: mypy
        run: mypy orbitx
