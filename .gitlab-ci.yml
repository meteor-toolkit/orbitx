# Default image, if not specified
image: "condaforge/miniforge3"

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"

stages:
  - Static Analysis
  - Readthedocs Documentation
  - Build latex Documentation
  - Publish latex Documentation
  - Test
  - Publish test report
  - Combine quality documentation

cache:
  key: ${CI_JOB_NAME}
  paths:
    - .cache/pip
    - venv/

# Virtual-environment template used by most jobs.
.py_venv:
  before_script:
    - echo -e "machine gitlab.npl.co.uk\nlogin gitlab-ci-token\npassword ${CI_JOB_TOKEN}" > ~/.netrc
    - python --version
    - conda create -n test_env python=3.12
    - conda init bash
    - source ~/.bashrc
    - source activate test_env
    - conda config --show channels
    - conda install Cartopy
    - conda install orekit
    - pip install -e ".[dev]"


### Static Analysis ###

ruff-format:
  extends: .py_venv
  stage: Static Analysis
  script:
    - ruff format --check orbitx
  allow_failure: true
  needs: []

ruff-lint:
  extends: .py_venv
  stage: Static Analysis
  script:
    - ruff check orbitx
  allow_failure: true
  needs: []

mypy:
  extends: .py_venv
  stage: Static Analysis
  script:
    - mypy orbitx
  allow_failure: true
  needs: []

### Tests ###

.pytest:
  extends: .py_venv
  script:
    - mkdir -p test_report
    - >
      pytest
      --html=test_report/report.html
      --cov-report html:test_report/cov_report
      --cov-report xml:test_report/coverage.xml
      --junitxml=test_report/junit.xml
      --cov=orbitx
  coverage: '/^TOTAL.+?(\d+\%)$/'
  needs: []
  artifacts:
    when: always
    paths:
      - test_report/
    reports:
      junit: test_report/junit.xml
      coverage_report:
        coverage_format: cobertura
        path: test_report/coverage.xml
    expire_in: 1 hour

test-3.11:
  extends: .pytest
  stage: Test
  image: "condaforge/miniforge3"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

test-3.12:
  extends: .pytest
  stage: Test
  image: "condaforge/miniforge3"
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

test-3.13:
  extends: .pytest
  stage: Test
  image: "condaforge/miniforge3"

test_report:
  needs: ["test-3.13"]
  stage: Publish test report
  image:
    name: oberonamsterdam/wkhtmltopdf
    entrypoint: [""]
  script:
    - wkhtmltopdf --enable-local-file-access file:////builds/altimetry/orbitx/test_report/report.html test_report.pdf
    - wkhtmltopdf --enable-local-file-access file:////builds/altimetry/orbitx/test_report/cov_report/index.html cov_report.pdf
    - mv test_report.pdf ./quality_documentation/test_report.pdf
    - mv cov_report.pdf ./quality_documentation/cov_report.pdf
  artifacts:
    paths:
      - quality_documentation
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

### Documentation ###

pages:
  extends: .py_venv
  stage: Readthedocs Documentation
  script:
    - pip install -e ".[dev,docs]"
    - sphinx-build docs public -b html
  artifacts:
    paths:
      - public
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always

pdf_make:
  extends: .py_venv
  stage: Build latex Documentation
  script:
    - pip install -e ".[dev,docs]"
    - sphinx-build docs latex -b latex
    - cp -r latex ./quality_documentation/latex
  artifacts:
    paths:
      - quality_documentation/latex
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

pdf_compile:
  needs: ["pdf_make"]
  stage: Publish latex Documentation
  image: charlesbaynham/ctanfull
  artifacts:
    paths:
      - user_manual.pdf
    expose_as: "Manual"
    name: ${CI_COMMIT_REF_SLUG}_manual.pdf
  script:
    - cd quality_documentation/latex
    - make
    - cp user_manual.pdf ../../user_manual.pdf
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always

pdf_compile_all:
  needs: ["pdf_make", "test_report"]
  stage: Combine quality documentation
  image: charlesbaynham/ctanfull
  artifacts:
    paths:
      - QualityDocumentation.pdf
    expose_as: "QualityDocumentation"
    name: ${CI_COMMIT_REF_SLUG}_QualityDocumentation.pdf
  script:
    - cd quality_documentation/latex
    - ls
    - cd ..
    - cd uml
    - for i in *.png; do echo "\includegraphics[width=\textwidth]{$i}">>uml.tex; done
    - cd ..
    - latexmk -e '$pdflatex=q/pdflatex %O -shell-escape %S/' -pdf
    - cp QualityDocumentation.pdf ../.
  rules:
    - if: '$CI_COMMIT_TAG'
      when: always
